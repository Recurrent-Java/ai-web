<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>My Profile</title>
    <meta charset="UTF-8">
    <meta name="description" content="Kazuki Asahinaのプロフィールです。">
    <link rel="stylesheet" href="css/html5reset-1.6.1.css">
    <link rel="stylesheet" href="css/portfolio.css">
  </head>
  <body>
    <header>
    <!--PC用ナビゲーション-->
      <nav>
        <h1><a href="#">MyProfile</a></h1>
        <div>
          <a href="index.html#about">About</a>
          <a href="index.html#works">Works</a>
        </div>
      </nav>
    </header>
    <main>
      <section id="main_imge">
        <figure>
          <img src="img/main.png" alt="カメラのメイン画像">
        </figure>
      </section>
      <!--About-->
      <section>
        <h2>About</h2>
        <div id="about">
          <figure>
            <img src="img/about.png" alt="Kazuki Asahinaの写真">  
          </figure>
          <div>
            <h3>Kazuki Asahina</h3>
            <ul>
              <li>25歳 長野県佐久市出身</li>
              <li>ソフトウェア業界でマーケティングに従事</li>
              <li>趣味はカメラ、愛機はCanon</li>
              <li>自然を撮影するのが好きで、海や山によく行く</li>
            </ul>
          </div>
        </div>
      </section>
      <!--Works-->
      <section>
        <h2>Works</h2>
        <div id="works_item">
          <figure class="works">
            <img src="img/works1.png" alt="新潟の海">
            <figcaption>新潟に訪れた際に、日本海の雄大さに魅了されて撮影した1枚</figcaption>
          </figure>
          <figure class="works">
            <img src="img/works2.png" alt="長野県御嶽山">
            <figcaption>地元長野の木曽町から撮影した、冠雪した御嶽山</figcaption>
          </figure>
          <figure class="works">
            <img src="img/works3.png" alt="京都の街並み">
            <figcaption>京都で撮影した、明け方の古き良き日本の街並み</figcaption>
          </figure>
        </div>
      </section>
    </main>
  </body>
  <footer>

  </footer>
</html>
